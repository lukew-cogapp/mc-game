<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sky -->
  <rect width="32" height="32" fill="#1a1a2e"/>
  <!-- Floating island -->
  <rect x="6" y="16" width="20" height="4" fill="#4a7c2e" rx="1"/>
  <rect x="8" y="20" width="16" height="4" fill="#8b6914" rx="1"/>
  <rect x="10" y="24" width="12" height="3" fill="#808080" rx="1"/>
  <!-- Tree -->
  <rect x="14" y="8" width="2" height="8" fill="#6b4226"/>
  <rect x="10" y="4" width="10" height="6" fill="#2d5a1e" rx="2"/>
  <rect x="11" y="3" width="8" height="4" fill="#2d5a1e" rx="2"/>
  <!-- Apple -->
  <circle cx="19" cy="6" r="2" fill="#e74c3c"/>
  <!-- Stars -->
  <circle cx="4" cy="4" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="28" cy="8" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="6" cy="12" r="0.8" fill="#ffffff" opacity="0.3"/>
</svg>
